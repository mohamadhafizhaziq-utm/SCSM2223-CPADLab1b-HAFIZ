<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="My personal portfolio">
    <link rel="stylesheet" href="style.css">
    <title>Contact Me</title>
</head>
<body>
    <header>
        <div class="header-text">
            <h1>MOHAMAD HAFIZ HAZIQ BIN MATDAIM</h1>
            <p>My first portfolio using HTML</p>
        </div>
        <div class="header-image">
            <img src="cat.jpg" alt="catmeme" width="150">
        </div>
    </header>

    <nav>
        <div class="logo">Hafiz Portfolio</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="academic.html">Academic</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <main class="form-container">
        <h2>Contact Me</h2>

        <form action="#" method="post">
            <fieldset>
                <legend>Personal Information</legend>

                <div class="form-group">
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required maxlength="60">
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" placeholder="012-3456789" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="age">Age:</label>
                        <input type="number" id="age" name="age" min="18" max="100" required>
                    </div>
                    <div class="form-group">
                        <label for="date">Preferred Contact Date:</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Message Details</legend>

                <div class="form-group">
                    <label for="subject">Subject:</label>
                    <select id="subject" name="subject">
                        <optgroup label="General">
                            <option value="question">Question</option>
                            <option value="feedback">Feedback</option>
                        </optgroup>
                        <optgroup label="Business">
                            <option value="job">Job Opportunity</option>
                            <option value="project">Project Collaboration</option>
                        </optgroup>
                    </select>
                </div>

                <div class="form-group">
                    <p>Preferred Contact Method:</p>
                    <label class="radio-label"><input type="radio" name="contact_method" value="email"> Email</label>
                    <label class="radio-label"><input type="radio" name="contact_method" value="phone"> Phone</label>
                    <label class="radio-label"><input type="radio" name="contact_method" value="whatsapp"> WhatsApp</label>
                </div>

                <div class="form-group">
                    <p>Services Interested:</p>
                    <label class="checkbox-label"><input type="checkbox" name="service" value="webdev"> Web Development</label>
                    <label class="checkbox-label"><input type="checkbox" name="service" value="design"> Design</label>
                    <label class="checkbox-label"><input type="checkbox" name="service" value="consult"> Consultation</label>
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="4" placeholder="Write your message here..."></textarea>
                </div>
            </fieldset>

            <button type="submit" class="btn-submit">Submit Message</button>
        </form>
    </main>
</body>
</html>
